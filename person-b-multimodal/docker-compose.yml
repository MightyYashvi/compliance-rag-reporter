version: "3.9"

services:
  # ── Person B: Multimodal Capture & Generation ──
  person-b:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./reports:/app/reports
    restart: unless-stopped
    depends_on:
      - person-a-rag  # remove if Person A isn't ready yet

  # ── Person A: RAG Service (placeholder) ──
  # Replace this with Person A's actual service when ready.
  # For now, set RAG_MOCK=true in .env and this won't matter.
  person-a-rag:
    image: python:3.11-slim
    command: >
      python -c "
      from http.server import HTTPServer, BaseHTTPRequestHandler
      import json
      class H(BaseHTTPRequestHandler):
          def do_GET(self):
              self.send_response(200)
              self.send_header('Content-Type','application/json')
              self.end_headers()
              self.wfile.write(json.dumps({'status':'ok'}).encode())
          def do_POST(self):
              self.send_response(200)
              self.send_header('Content-Type','application/json')
              self.end_headers()
              self.wfile.write(json.dumps({'query':'mock','chunks':[]}).encode())
      HTTPServer(('0.0.0.0',8001),H).serve_forever()
      "
    ports:
      - "8001:8001"
